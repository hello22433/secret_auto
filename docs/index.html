<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신입 PC 설정 관리자 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .config-btn {
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .config-btn:hover { background: #475569; }

        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .refresh-btn:hover { background: #2563eb; }

        /* Config Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            width: 420px;
        }

        .modal h3 { margin-bottom: 16px; font-size: 16px; }

        .modal label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        .modal input {
            width: 100%;
            padding: 8px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .modal-actions {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-save { background: #3b82f6; color: white; }
        .btn-cancel { background: #334155; color: #e2e8f0; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 24px 32px;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card.total .value { color: #e2e8f0; }
        .stat-card.success .value { color: #22c55e; }
        .stat-card.partial .value { color: #f59e0b; }
        .stat-card.today .value { color: #3b82f6; }

        .content { padding: 0 32px 32px; }

        .table-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        .table-header {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 { font-size: 16px; }

        .search-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            width: 240px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 20px;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            user-select: none;
        }

        th:hover { color: #94a3b8; }
        th.sorted { color: #3b82f6; }

        td {
            padding: 14px 20px;
            font-size: 14px;
            border-bottom: 1px solid #1e293b;
        }

        tr:hover td { background: #1a2744; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.success { background: #064e3b; color: #34d399; }
        .badge.partial { background: #451a03; color: #fbbf24; }

        .detail-toggle {
            color: #3b82f6;
            cursor: pointer;
            font-size: 13px;
        }

        .detail-toggle:hover { text-decoration: underline; }

        .detail-row td {
            padding: 0;
            background: #0f172a;
        }

        .detail-content {
            padding: 16px 20px;
        }

        .detail-content table {
            width: auto;
        }

        .detail-content td {
            padding: 6px 16px;
            border: none;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }

        .error-msg {
            text-align: center;
            padding: 40px;
            color: #f87171;
        }

        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>신입 PC 설정 관리자 대시보드</h1>
    <div class="header-right">
        <button class="config-btn" onclick="openConfig()">설정</button>
        <button class="refresh-btn" onclick="loadData()">새로고침</button>
    </div>
</div>

<!-- Config Modal -->
<div class="modal-overlay" id="configModal">
    <div class="modal">
        <h3>GitHub 설정</h3>
        <label>Owner (사용자명 또는 조직명)</label>
        <input type="text" id="cfgOwner" placeholder="your-github-username">
        <label>Repository</label>
        <input type="text" id="cfgRepo" placeholder="secret_auto">
        <label>Personal Access Token</label>
        <input type="password" id="cfgToken" placeholder="ghp_xxxxx">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeConfig()">취소</button>
            <button class="btn-save" onclick="saveConfig()">저장</button>
        </div>
    </div>
</div>

<div class="stats">
    <div class="stat-card total">
        <div class="label">전체</div>
        <div class="value" id="statTotal">-</div>
    </div>
    <div class="stat-card success">
        <div class="label">성공</div>
        <div class="value" id="statSuccess">-</div>
    </div>
    <div class="stat-card partial">
        <div class="label">일부 실패</div>
        <div class="value" id="statPartial">-</div>
    </div>
    <div class="stat-card today">
        <div class="label">오늘</div>
        <div class="value" id="statToday">-</div>
    </div>
</div>

<div class="content">
    <div class="table-container">
        <div class="table-header">
            <h2>설정 기록</h2>
            <input type="text" class="search-input" placeholder="이름 또는 부서 검색..." oninput="filterTable(this.value)">
        </div>
        <div id="tableBody">
            <div class="loading">
                <div class="spinner"></div>
                <div>데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>
</div>

<script>
    let allIssues = [];
    let currentSort = { field: 'date', asc: false };

    function getConfig() {
        return {
            owner: localStorage.getItem('gh_owner') || '',
            repo: localStorage.getItem('gh_repo') || 'secret_auto',
            token: localStorage.getItem('gh_token') || ''
        };
    }

    function openConfig() {
        const cfg = getConfig();
        document.getElementById('cfgOwner').value = cfg.owner;
        document.getElementById('cfgRepo').value = cfg.repo;
        document.getElementById('cfgToken').value = cfg.token;
        document.getElementById('configModal').classList.add('active');
    }

    function closeConfig() {
        document.getElementById('configModal').classList.remove('active');
    }

    function saveConfig() {
        localStorage.setItem('gh_owner', document.getElementById('cfgOwner').value.trim());
        localStorage.setItem('gh_repo', document.getElementById('cfgRepo').value.trim());
        localStorage.setItem('gh_token', document.getElementById('cfgToken').value.trim());
        closeConfig();
        loadData();
    }

    async function loadData() {
        const cfg = getConfig();

        if (!cfg.owner || !cfg.token) {
            document.getElementById('tableBody').innerHTML =
                '<div class="error-msg">GitHub 설정이 필요합니다. 우측 상단 [설정] 버튼을 클릭하세요.</div>';
            return;
        }

        document.getElementById('tableBody').innerHTML =
            '<div class="loading"><div class="spinner"></div><div>데이터를 불러오는 중...</div></div>';

        try {
            const issues = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
                const res = await fetch(
                    `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/issues?labels=onboarding&state=all&per_page=100&page=${page}`,
                    { headers: { 'Authorization': `token ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' } }
                );

                if (!res.ok) throw new Error(`GitHub API 오류: ${res.status}`);

                const data = await res.json();
                if (data.length === 0) { hasMore = false; break; }
                issues.push(...data);
                page++;
                if (data.length < 100) hasMore = false;
            }

            allIssues = issues.map(parseIssue);
            updateStats();
            renderTable();

        } catch (e) {
            document.getElementById('tableBody').innerHTML =
                `<div class="error-msg">${e.message}</div>`;
        }
    }

    function parseIssue(issue) {
        const titleMatch = issue.title.match(/\[(SUCCESS|PARTIAL)\]\s*(.+?)\s*\((.+?)\)\s*-\s*(.+)/);
        const body = issue.body || '';

        // 상세 결과 파싱
        const detailRows = [];
        const detailMatch = body.match(/## 상세 결과[\s\S]*?\|---\|---\|---\|([\s\S]*?)$/);
        if (detailMatch) {
            const rows = detailMatch[1].trim().split('\n');
            rows.forEach(row => {
                const cols = row.split('|').filter(c => c.trim());
                if (cols.length >= 3) {
                    detailRows.push({
                        step: cols[0].trim(),
                        status: cols[1].trim(),
                        note: cols[2].trim()
                    });
                }
            });
        }

        return {
            id: issue.number,
            status: titleMatch ? titleMatch[1] : 'UNKNOWN',
            name: titleMatch ? titleMatch[2].trim() : issue.title,
            department: titleMatch ? titleMatch[3].trim() : '-',
            date: titleMatch ? titleMatch[4].trim() : issue.created_at.split('T')[0],
            created: issue.created_at,
            url: issue.html_url,
            details: detailRows
        };
    }

    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('statTotal').textContent = allIssues.length;
        document.getElementById('statSuccess').textContent = allIssues.filter(i => i.status === 'SUCCESS').length;
        document.getElementById('statPartial').textContent = allIssues.filter(i => i.status === 'PARTIAL').length;
        document.getElementById('statToday').textContent = allIssues.filter(i => i.date === today).length;
    }

    function renderTable(filter = '') {
        let data = allIssues;

        if (filter) {
            const q = filter.toLowerCase();
            data = data.filter(i => i.name.toLowerCase().includes(q) || i.department.toLowerCase().includes(q));
        }

        // Sort
        data.sort((a, b) => {
            let va = a[currentSort.field], vb = b[currentSort.field];
            if (currentSort.field === 'date') { va = a.created; vb = b.created; }
            if (va < vb) return currentSort.asc ? -1 : 1;
            if (va > vb) return currentSort.asc ? 1 : -1;
            return 0;
        });

        if (data.length === 0) {
            document.getElementById('tableBody').innerHTML = '<div class="empty">기록이 없습니다.</div>';
            return;
        }

        let html = '<table><thead><tr>';
        const columns = [
            { key: 'name', label: '이름' },
            { key: 'department', label: '부서' },
            { key: 'status', label: '상태' },
            { key: 'date', label: '날짜' },
            { key: 'detail', label: '상세' }
        ];

        columns.forEach(col => {
            const sorted = currentSort.field === col.key ? ' class="sorted"' : '';
            if (col.key === 'detail') {
                html += `<th>상세</th>`;
            } else {
                html += `<th${sorted} onclick="sortBy('${col.key}')">${col.label}</th>`;
            }
        });
        html += '</tr></thead><tbody>';

        data.forEach((item, idx) => {
            const badgeClass = item.status === 'SUCCESS' ? 'success' : 'partial';
            const badgeText = item.status === 'SUCCESS' ? '성공' : '일부 실패';

            html += `<tr>
                <td>${item.name}</td>
                <td>${item.department}</td>
                <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                <td>${item.date}</td>
                <td><span class="detail-toggle" onclick="toggleDetail(${idx})">보기</span></td>
            </tr>`;

            html += `<tr class="detail-row" id="detail-${idx}" style="display:none"><td colspan="5">
                <div class="detail-content">
                    <table>
                        <tr><th>단계</th><th>상태</th><th>비고</th></tr>`;

            item.details.forEach(d => {
                const sc = d.status === 'pass' ? 'color:#34d399' : 'color:#fbbf24';
                html += `<tr><td>${d.step}</td><td style="${sc}">${d.status}</td><td>${d.note}</td></tr>`;
            });

            html += `</table>
                    <div style="margin-top:8px"><a href="${item.url}" target="_blank" style="color:#3b82f6;font-size:12px;">GitHub Issue 원본 보기</a></div>
                </div></td></tr>`;
        });

        html += '</tbody></table>';
        document.getElementById('tableBody').innerHTML = html;
    }

    function toggleDetail(idx) {
        const row = document.getElementById(`detail-${idx}`);
        row.style.display = row.style.display === 'none' ? '' : 'none';
    }

    function sortBy(field) {
        if (currentSort.field === field) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.field = field;
            currentSort.asc = true;
        }
        renderTable(document.querySelector('.search-input').value);
    }

    function filterTable(value) {
        renderTable(value);
    }

    // 초기 로드
    loadData();
</script>

</body>
</html>
